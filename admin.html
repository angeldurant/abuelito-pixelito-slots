<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 Admin — Abuelito Pixelito</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--gold:#FFD700;--neon:#00CFFF;--pink:#FF2D78;--green:#00FF88;--purple:#BF00FF;--dark:#020408;--red:#FF4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);font-family:'Orbitron',monospace;color:#fff;min-height:100vh;padding:12px;background-image:radial-gradient(ellipse at 20% 20%,rgba(0,207,255,.05) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(191,0,255,.05) 0%,transparent 60%);}
h1{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--gold);text-align:center;padding:10px 0 3px;text-shadow:0 0 15px var(--gold);letter-spacing:2px;}
.subtitle{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(0,207,255,.5);text-align:center;letter-spacing:3px;margin-bottom:12px;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:5px 12px;margin-bottom:10px;background:rgba(0,0,0,.6);border:1px solid rgba(0,207,255,.15);border-radius:4px;font-family:'Share Tech Mono',monospace;font-size:9px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);animation:blink 1s ease-in-out infinite;}
.status-dot.connected{background:var(--green);box-shadow:0 0 6px var(--green);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.section{background:rgba(0,0,0,.5);border:1px solid rgba(255,215,0,.15);border-radius:6px;margin-bottom:10px;overflow:hidden;}
.section-header{padding:6px 12px;background:linear-gradient(90deg,rgba(255,215,0,.08),transparent);border-bottom:1px solid rgba(255,215,0,.1);font-size:7px;color:var(--gold);letter-spacing:2px;font-weight:700;}
.section-body{padding:10px 12px;}
.btn{font-family:'Orbitron',monospace;font-size:7px;padding:8px 12px;border:2px solid;background:rgba(0,0,0,.6);cursor:pointer;letter-spacing:1px;border-radius:3px;transition:all .15s;font-weight:700;}
.btn:active{transform:scale(.95);}
.btn-green{border-color:var(--green);color:var(--green);}
.btn-green:hover{background:rgba(0,255,136,.15);}
.btn-gold{border-color:var(--gold);color:var(--gold);}
.btn-gold:hover{background:rgba(255,215,0,.15);}
.btn-red{border-color:var(--red);color:var(--red);}
.btn-red:hover{background:rgba(255,68,68,.15);}
.btn-full{width:100%;}
.input-row{display:flex;gap:8px;margin-bottom:8px;}
.admin-input{flex:1;background:rgba(0,0,0,.7);border:2px solid rgba(0,207,255,.3);color:var(--neon);font-family:'Share Tech Mono',monospace;font-size:11px;padding:7px 10px;outline:none;border-radius:4px;}
.admin-input::placeholder{color:rgba(0,207,255,.25);}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:8px;}
.stat-box{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:4px;padding:8px;text-align:center;}
.stat-box .slbl{font-size:6px;color:rgba(255,255,255,.3);letter-spacing:1px;display:block;margin-bottom:3px;}
.stat-box .sval{font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;}
.stat-box.gold .sval{color:var(--gold);text-shadow:0 0 8px var(--gold);}
.stat-box.neon .sval{color:var(--neon);text-shadow:0 0 8px var(--neon);}
.stat-box.green .sval{color:var(--green);text-shadow:0 0 8px var(--green);}
.stat-box.pink .sval{color:var(--pink);text-shadow:0 0 8px var(--pink);}
.top-list{font-family:'Share Tech Mono',monospace;font-size:8px;max-height:120px;overflow-y:auto;}
.top-list::-webkit-scrollbar{width:3px;}
.top-list::-webkit-scrollbar-thumb{background:rgba(255,215,0,.3);}
.top-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.top-rank{width:16px;text-align:center;font-size:10px;flex-shrink:0;}
.top-user{flex:1;color:var(--neon);}
.top-spins{color:rgba(255,255,255,.3);font-size:7px;width:50px;text-align:right;}
.top-empty{color:rgba(255,255,255,.2);font-size:8px;padding:10px 0;text-align:center;}
.gift-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;}
.gift-btn{font-family:'Share Tech Mono',monospace;font-size:8px;padding:6px 8px;border:1px solid rgba(255,215,0,.25);background:rgba(0,0,0,.5);color:rgba(255,248,220,.7);cursor:pointer;border-radius:3px;text-align:left;transition:all .15s;}
.gift-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.08);}
.gift-btn .spins{float:right;color:var(--neon);}
.queue-list{font-family:'Share Tech Mono',monospace;font-size:8px;max-height:80px;overflow-y:auto;}
.queue-item{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.queue-item .user{color:var(--neon);}
.queue-item .count{color:var(--gold);}
.queue-empty{color:rgba(255,255,255,.2);font-size:8px;font-family:'Share Tech Mono',monospace;}
.log{max-height:120px;overflow-y:auto;font-family:'Share Tech Mono',monospace;font-size:8px;line-height:1.8;}
.log::-webkit-scrollbar{width:3px;}
.log::-webkit-scrollbar-thumb{background:rgba(0,207,255,.3);}
.log-entry{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.log-entry .time{color:rgba(255,255,255,.25);margin-right:6px;}
.log-entry.gift .msg{color:var(--green);}
.log-entry.spin .msg{color:var(--neon);}
.log-entry.sys .msg{color:rgba(255,215,0,.5);}
.log-entry.win .msg{color:var(--pink);}
</style>
</head>
<body>
<h1>🎰 ADMIN PANEL</h1>
<div class="subtitle">ABUELITO PIXELITO — SLOTS</div>
<div class="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span style="color:rgba(255,255,255,.4);">SLOT:</span>
  <span id="status-txt" style="color:rgba(255,68,68,.8);">Abrí el slot en otra pestaña</span>
</div>
<div class="section">
  <div class="section-header">🔊 AUDIO</div>
  <div class="section-body">
    <button class="btn btn-green btn-full" id="audio-btn" onclick="toggleAudioAdmin()">▶ ACTIVAR SONIDO</button>
  </div>
</div>
<div class="section">
  <div class="section-header">📊 ESTADÍSTICAS DEL LIVE</div>
  <div class="section-body">
    <div class="stats-grid">
      <div class="stat-box gold"><span class="slbl">GIROS TOTALES</span><span class="sval" id="st-spins">0</span></div>
      <div class="stat-box green"><span class="slbl">PREMIOS</span><span class="sval" id="st-wins">0</span></div>
      <div class="stat-box neon"><span class="slbl">JUGADORES</span><span class="sval" id="st-players">0</span></div>
      <div class="stat-box pink"><span class="slbl">REGALOS HOY</span><span class="sval" id="st-gifts">0</span></div>
    </div>
    <button class="btn btn-red btn-full" onclick="resetStats()">↺ RESETEAR STATS</button>
  </div>
</div>
<div class="section">
  <div class="section-header">🏆 TOP JUGADORES HOY</div>
  <div class="section-body">
    <div class="top-list" id="top-list"><div class="top-empty">— sin datos aún —</div></div>
  </div>
</div>
<div class="section">
  <div class="section-header">🎮 GIRO MANUAL</div>
  <div class="section-body">
    <div class="input-row">
      <input class="admin-input" id="spin-user" placeholder="usuario..." type="text">
      <input class="admin-input" id="spin-count" type="number" value="1" style="width:70px;flex:none;">
    </div>
    <button class="btn btn-gold btn-full" onclick="manualSpin()">🎰 GIRAR AHORA</button>
  </div>
</div>
<div class="section">
  <div class="section-header">🎁 SIMULAR REGALO</div>
  <div class="section-body">
    <div class="input-row">
      <input class="admin-input" id="gift-user" placeholder="usuario..." type="text" value="tester">
    </div>
    <div class="gift-grid" id="gift-grid"></div>
  </div>
</div>
<div class="section">
  <div class="section-header">⏳ COLA DE GIROS</div>
  <div class="section-body">
    <div class="queue-list" id="queue-list"><span class="queue-empty">— sin jugadores en cola —</span></div>
  </div>
</div>
<div class="section">
  <div class="section-header">📋 ACTIVIDAD EN VIVO</div>
  <div class="section-body">
    <div class="log" id="log"></div>
  </div>
</div>
<script>
const ch=new BroadcastChannel('abuelito_admin');
let slotConnected=false,audioActive=false;
let stats={spins:0,wins:0,players:new Set(),gifts:0};
let topPlayers={};
const queueData={};
ch.onmessage=e=>{
  const{cmd,data}=e.data;
  if(cmd==='pong'){slotConnected=true;updateStatus(true);}
  if(cmd==='gift_received'){
    stats.gifts++;stats.players.add(data.username);
    if(!topPlayers[data.username])topPlayers[data.username]={spins:0,gifts:0};
    topPlayers[data.username].gifts+=data.spins;
    topPlayers[data.username].spins+=data.spins;
    updateQueue(data);updateStatsUI();renderTop();
    addLog('gift',`🎁 @${data.username} — ${data.spins} giro(s)`);
  }
  if(cmd==='spin_done'){stats.spins++;updateStatsUI();}
  if(cmd==='win'){stats.wins++;updateStatsUI();addLog('win',`🏆 @${data?.username||'?'} — ${data?.prize||''} ${data?.pts||0}pts`);}
};
function sendCmd(cmd,data={}){ch.postMessage({cmd,data});}
setInterval(()=>{ch.postMessage({cmd:'ping'});setTimeout(()=>{if(!slotConnected)updateStatus(false);slotConnected=false;},1500);},3000);
function updateStatus(ok){
  document.getElementById('status-dot').classList.toggle('connected',ok);
  const t=document.getElementById('status-txt');
  t.textContent=ok?'Conectado ✓':'Abrí el slot en otra pestaña';
  t.style.color=ok?'var(--green)':'rgba(255,68,68,.8)';
}
function toggleAudioAdmin(){
  const btn=document.getElementById('audio-btn');
  if(!audioActive){
    sendCmd('unlock_audio');audioActive=true;
    btn.textContent='🔊 SONIDO ACTIVO — click para pausar música';
    btn.classList.replace('btn-green','btn-red');
    addLog('sys','🔊 Audio activado');
  }else{
    sendCmd('music_toggle');audioActive=false;
    btn.textContent='▶ ACTIVAR SONIDO';
    btn.classList.replace('btn-red','btn-green');
    addLog('sys','🔇 Música pausada');
  }
}
function updateStatsUI(){
  document.getElementById('st-spins').textContent=stats.spins;
  document.getElementById('st-wins').textContent=stats.wins;
  document.getElementById('st-players').textContent=stats.players.size;
  document.getElementById('st-gifts').textContent=stats.gifts;
}
function resetStats(){
  if(!confirm('¿Resetear todas las estadísticas?'))return;
  stats={spins:0,wins:0,players:new Set(),gifts:0};
  Object.keys(topPlayers).forEach(k=>delete topPlayers[k]);
  Object.keys(queueData).forEach(k=>delete queueData[k]);
  updateStatsUI();renderTop();renderQueue();addLog('sys','↺ Stats reseteadas');
}
function renderTop(){
  const list=document.getElementById('top-list');
  const sorted=Object.entries(topPlayers).sort((a,b)=>b[1].spins-a[1].spins).slice(0,5);
  if(!sorted.length){list.innerHTML='<div class="top-empty">— sin datos aún —</div>';return;}
  const medals=['🥇','🥈','🥉','4','5'];
  list.innerHTML=sorted.map(([u,d],i)=>`<div class="top-row"><span class="top-rank">${medals[i]}</span><span class="top-user">@${u}</span><span class="top-spins">${d.spins} giros</span></div>`).join('');
}
function manualSpin(){
  const user=document.getElementById('spin-user').value.trim()||'admin';
  const count=parseInt(document.getElementById('spin-count').value)||1;
  sendCmd('gift',{username:user,spins:count});
  addLog('spin',`🎰 Manual: @${user} × ${count}`);
}
const GIFTS=[{name:'Rosa',spins:1},{name:'TikTok',spins:1},{name:'Flor',spins:1},{name:'Galaxia',spins:3},{name:'Cohete',spins:3},{name:'Universo pequeño',spins:2},{name:'León',spins:5},{name:'Dragón',spins:5},{name:'Castillo',spins:5},{name:'Universo',spins:10},{name:'Coche deportivo',spins:8},{name:'Nave',spins:7}];
function buildGiftGrid(){document.getElementById('gift-grid').innerHTML=GIFTS.map(g=>`<button class="gift-btn" onclick="simGift('${g.name}',${g.spins})">${g.name}<span class="spins">${g.spins}🎰</span></button>`).join('');}
function simGift(name,spins){const user=document.getElementById('gift-user').value.trim()||'tester';sendCmd('gift',{username:user,spins});addLog('gift',`🎁 SIM: @${user} → ${name} (${spins})`);}
function updateQueue(data){if(data.spins>0)queueData[data.username]=(queueData[data.username]||0)+data.spins;renderQueue();}
function renderQueue(){
  const list=document.getElementById('queue-list');
  const entries=Object.entries(queueData);
  if(!entries.length){list.innerHTML='<span class="queue-empty">— sin jugadores en cola —</span>';return;}
  list.innerHTML=entries.map(([u,c])=>`<div class="queue-item"><span class="user">@${u}</span><span class="count">${c} giro${c>1?'s':''}</span></div>`).join('');
}
function addLog(type,msg){
  const log=document.getElementById('log');
  const now=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const div=document.createElement('div');
  div.className=`log-entry ${type}`;
  div.innerHTML=`<span class="time">${now}</span><span class="msg">${msg}</span>`;
  log.insertBefore(div,log.firstChild);
  if(log.children.length>50)log.removeChild(log.lastChild);
}
buildGiftGrid();
addLog('sys','🟢 Admin iniciado');
updateStatus(false);
</script>
</body>
</html>
